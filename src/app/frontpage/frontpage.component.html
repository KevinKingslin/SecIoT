<mat-toolbar class="app-header" style="background-color: red;">
    <div><a routerLink="/index" routerLinkActive="active" class="positronx center"><img id="logo" src="/assets/logo.png" alt="image" style="height: 60px;"></a></div>
    <span class="nav-tool-items">
      <a mat-button routerLink="/login" routerLinkActive="active"></a>
      <a mat-button mat-raised-button routerLink="/login" routerLinkActive="active">Log out</a>
    </span>
</mat-toolbar>
<div id="frontpage">  
    <div class="center">
        <button class="frontpage-button" mat-raised-button color="accent"  [matMenuTriggerFor]="appAnalysis">
            Analyze App
        </button>
        <mat-menu #appAnalysis="matMenu">
            <button mat-menu-item>
                <label for="file-input" class="btn btn-default" flow-btn>
                    <i class="fa-solid fa-file-arrow-up"></i>
                    MobSF
                    <input id="file-input" type="file"style="visibility: hidden; position: absolute;">
                </label>
            </button>
            <button mat-menu-item>
                <label for="file-input" class="btn btn-default" flow-btn>
                    <i class="fa-solid fa-file-arrow-up"></i>
                    FindSecBugs
                    <input id="file-input" type="file"style="visibility: hidden; position: absolute; width: 100%;">
                </label>
            </button>
            <button mat-menu-item (click)="OpenForm = 'spike'">Fuzzing</button>
        </mat-menu>
        <button class="frontpage-button" mat-raised-button color="primary" [matMenuTriggerFor]="IoT">Scan IoT Network</button>
        <mat-menu #IoT="matMenu">
            <button mat-menu-item (click)="OpenForm = 'nmap'">Port Scanning</button>
            <button mat-menu-item (click)="OpenForm = 'openvas'">Vulnerability Assessment</button>
            <button mat-menu-item (click)="OpenForm = 'metasploit'">Exploitation</button>
        </mat-menu>
        <app-nmapform *ngIf="OpenForm === 'nmap'"></app-nmapform>
        <app-openvasform *ngIf="OpenForm === 'openvas'"></app-openvasform>
        <app-metasploitform *ngIf="OpenForm === 'metasploit'"></app-metasploitform>
        <app-spikeform *ngIf="OpenForm === 'spike'"></app-spikeform>
        <!-- <mat-spinner id="loading" diameter="75"></mat-spinner> -->
    </div>
</div>
