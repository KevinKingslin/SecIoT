<form class="example-form" (ngSubmit)="onSubmit()">
    <div class="main-wrapper main-div" fxLayout="column" fxLayoutAlign="center center">
        <mat-card class="box">
            <mat-card-header>
                <mat-card-title>Fuzzing</mat-card-title>
              </mat-card-header>
            <mat-card-content>
                <mat-form-field class="example-full-width">
                    <input matInput [formControl]="host" placeholder="Host IP" required>
                    <mat-error *ngIf="host.invalid">You must enter a value</mat-error>
                </mat-form-field>
                <mat-form-field class="example-full-width">
                    <input matInput [formControl]="port" placeholder="Port" required>
                    <mat-error *ngIf="port.invalid">You must enter a value</mat-error>
                </mat-form-field>
                <mat-form-field class="example-full-width">
                    <input matInput [formControl]="skipvar" placeholder="Skip Variable (optional)">
                </mat-form-field>
                <mat-form-field class="example-full-width">
                    <input matInput [formControl]="skipstring" placeholder="Skip String (optional)">
                </mat-form-field>
            </mat-card-content>
            <button type="submit" [disabled]="host.invalid || port.invalid" mat-stroked-button color="primary" class="btn-block">Submit</button>
        </mat-card>
    </div>
</form>
